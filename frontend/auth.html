<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso — Rhythm Site</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav>
        <a href="index.html" class="logo">Rhythm<span>Site</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Eventos</a></li>
        </ul>
        <div id="nav-actions"></div>
    </nav>

    <main class="container">
        <div class="auth-box">
            <div class="auth-tabs">
                <div id="tab-login" class="auth-tab active" onclick="switchTab('login')">Ingresar</div>
                <div id="tab-register" class="auth-tab" onclick="switchTab('register')">Registrarse</div>
            </div>

            <!-- Login Form -->
            <form id="form-login" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="login-nick">Usuario (Nick)</label>
                    <input type="text" id="login-nick" required placeholder="Ingresa tu nick">
                </div>
                <div class="form-group">
                    <label for="login-pass">Contraseña</label>
                    <input type="password" id="login-pass" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Entrar</button>
            </form>

            <!-- Register Form (Hidden by default) -->
            <form id="form-register" onsubmit="handleRegister(event)" style="display: none;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="reg-nombre">Nombre</label>
                        <input type="text" id="reg-nombre" required placeholder="Juan">
                    </div>
                    <div class="form-group">
                        <label for="reg-apellido">Apellido</label>
                        <input type="text" id="reg-apellido" required placeholder="Pérez">
                    </div>
                </div>
                <div class="form-group">
                    <label for="reg-nick">Nick / Usuario</label>
                    <input type="text" id="reg-nick" required placeholder="juanp12">
                </div>
                <div class="form-group">
                    <label for="reg-pass">Contraseña</label>
                    <input type="password" id="reg-pass" required placeholder="Mínimo 6 caracteres">
                </div>
                <div class="form-group">
                    <label for="reg-nacimiento">Fecha de Nacimiento</label>
                    <input type="date" id="reg-nacimiento" required>
                </div>
                <div class="form-group">
                    <label for="reg-correo">Correo Electrónico</label>
                    <input type="email" id="reg-correo" required placeholder="juan@correo.com">
                </div>
                <div class="form-group">
                    <label for="reg-telefono">Teléfono</label>
                    <input type="tel" id="reg-telefono" required placeholder="3001234567">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Crear Cuenta</button>
            </form>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
